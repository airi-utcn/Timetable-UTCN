<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - UTCN Timetable</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --bg-raised: #ffffff;
      --surface: #ffffff;
      --surface-2: #edf1f6;
      --border: #dfe5ec;
      --border-2: #c3cdd9;
      --text: #18222e;
      --text-dim: #4e5d6d;
      --text-faint: #8593a3;
      --accent: #1b5cc4;
      --accent-dim: #6f9bd9;
      --accent-bg: rgba(27, 92, 196, .08);
      --warn: #a3700f;
      --danger: #c23a47;
      --grid-line: rgba(27, 92, 196, .055);
      --tick: var(--border-2);
      --font: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SF Mono", "Roboto Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
      --radius: 8px;
      --radius-sm: 7px;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      font-family: var(--font);
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 28px 28px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .login-panel {
      width: min(100%, 440px);
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      position: relative;
    }
    .login-panel::before,
    .login-panel::after {
      content: '';
      position: absolute;
      width: 9px;
      height: 9px;
      border: 0 solid var(--tick);
      pointer-events: none;
    }
    .login-panel::before {
      top: -1px;
      left: -1px;
      border-top-width: 2px;
      border-left-width: 2px;
      border-top-left-radius: var(--radius);
    }
    .login-panel::after {
      right: -1px;
      bottom: -1px;
      border-right-width: 2px;
      border-bottom-width: 2px;
      border-bottom-right-radius: var(--radius);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: .9rem;
      font-weight: 800;
    }
    h2 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.15;
      letter-spacing: 0;
    }
    .sub {
      display: block;
      margin-top: 4px;
      color: var(--text-faint);
      font-size: .78rem;
      letter-spacing: .6px;
      text-transform: uppercase;
    }
    .notice,
    .error {
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: .92rem;
      border: 1px solid var(--border-2);
      background: var(--surface);
    }
    .notice { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 45%, var(--border)); }
    .error { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 45%, var(--border)); }
    form { display: grid; gap: 14px; }
    label {
      display: grid;
      gap: 5px;
      color: var(--text-faint);
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      margin-top: 4px;
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius-sm);
      background: var(--accent-bg);
      color: var(--accent);
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: .9rem;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-panel">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">UT</div>
        <div>
          <h2>Admin sign in</h2>
          <span class="sub">UTCN Timetable System</span>
        </div>
      </div>
      {% if expired %}
        <div class="notice">Your session expired; please sign in again.</div>
      {% endif %}
      {% if message %}
        <div class="error">{{ message }}</div>
      {% endif %}
      <form method="post" action="/admin/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <label>Username <input name="username" autocomplete="username" required /></label>
        <label>Password <input name="password" type="password" autocomplete="current-password" required/></label>
        <button type="submit">Login</button>
      </form>
      <a href="/" class="back-link">Back to schedule</a>
    </section>
  </main>
</body>
</html>
